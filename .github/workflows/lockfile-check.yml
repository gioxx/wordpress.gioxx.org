name: Lockfile check

on:
  pull_request:
    paths:
      - "package.json"
      - "bun.lock"

jobs:
  frozen-lockfile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile

  smoke-test:
    runs-on: ubuntu-latest
    needs: frozen-lockfile
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run build
      - name: Boot worker and check it responds
        run: |
          npx wrangler dev --config dist/server/wrangler.json --port 8787 --ip 127.0.0.1 &
          WRANGLER_PID=$!
          for i in $(seq 1 20); do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8787/ || echo 000)
            if [ "$CODE" = "200" ]; then
              echo "Worker responded 200"
              kill $WRANGLER_PID
              exit 0
            elif [ "$CODE" != "000" ]; then
              echo "Worker responded $CODE"
              kill $WRANGLER_PID 2>/dev/null || true
              exit 1
            fi
            sleep 2
          done
          echo "Worker never came up (timed out)"
          kill $WRANGLER_PID 2>/dev/null || true
          exit 1
